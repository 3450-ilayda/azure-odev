        .badge {
            background: #e1f0fe;
            color: #0078d4;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

        <div class="badge">Azure App Service & GitHub Actions</div>
